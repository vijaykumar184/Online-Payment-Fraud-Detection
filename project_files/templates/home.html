<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Fraud Shield</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    height:100vh;
    display:flex;
    background:#0f172a;
    color:white;
}

/* Left Side Panel */
.left{
    width:50%;
    background:linear-gradient(135deg,#0ea5e9,#22c55e);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:60px;
}

.left h1{
    font-size:42px;
    font-weight:700;
    margin-bottom:20px;
}

.left p{
    font-size:18px;
    opacity:0.9;
    text-align:center;
    max-width:400px;
}

/* Right Side Panel */
.right{
    width:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
}

.card{
    background:#1e293b;
    padding:50px;
    border-radius:20px;
    width:420px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

.card h2{
    margin-bottom:15px;
    font-size:28px;
}

.card p{
    font-size:14px;
    opacity:0.7;
    margin-bottom:30px;
}

button{
    padding:15px 40px;
    border:none;
    border-radius:40px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    background:linear-gradient(90deg,#0ea5e9,#22c55e);
    color:white;
    transition:0.3s ease;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px rgba(34,197,94,0.6);
}

.footer{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    font-size:12px;
    opacity:0.6;
}
</style>
</head>

<body>

<div class="left">
    <h1>AI Fraud Shield</h1>
    <p>
        Protecting digital transactions with intelligent machine learning models.
        Detect suspicious payments instantly and secure your financial ecosystem.
    </p>
</div>

<div class="right">
    <div class="card">
        <h2>Online Payment Fraud Detection</h2>
        <p>Real-Time Prediction System</p>
        <a href="/predict" style="text-decoration:none;">
            <button>Launch Detection</button>
        </a>
    </div>
</div>

<div class="footer">
    © 2026 AI Fraud Shield | Machine Learning Security System
</div>

</body>
</html>
