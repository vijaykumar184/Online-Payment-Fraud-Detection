<!DOCTYPE html>
<html>
<head>
    <title>AI Fraud Transaction Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        *{
            font-family:'Inter',sans-serif;
            box-sizing:border-box;
        }

        body{
            margin:0;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#0f172a;
            color:white;
        }

        .container{
            display:flex;
            width:900px;
            max-width:95%;
            border-radius:25px;
            overflow:hidden;
            box-shadow:0 20px 60px rgba(0,0,0,0.6);
        }

        /* Left Info Panel */
        .left-panel{
            width:40%;
            background:linear-gradient(135deg,#0ea5e9,#22c55e);
            padding:40px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .left-panel h2{
            font-size:28px;
            margin-bottom:15px;
        }

        .left-panel p{
            font-size:14px;
            line-height:1.6;
            opacity:0.9;
        }

        /* Right Form Panel */
        .form-container{
            width:60%;
            background:#1e293b;
            padding:40px;
        }

        .form-container h2{
            text-align:center;
            margin-bottom:25px;
            font-weight:600;
        }

        input, select{
            width:100%;
            padding:12px;
            margin:8px 0;
            border-radius:10px;
            border:none;
            outline:none;
            background:#334155;
            color:white;
        }

        input::placeholder{
            color:#cbd5e1;
        }

        select{
            cursor:pointer;
        }

        .btn{
            margin-top:15px;
            padding:14px;
            border:none;
            border-radius:30px;
            font-weight:600;
            cursor:pointer;
            background:linear-gradient(90deg,#0ea5e9,#22c55e);
            color:white;
            transition:0.3s;
        }

        .btn:hover{
            transform:scale(1.05);
            box-shadow:0 0 20px rgba(34,197,94,0.6);
        }

        .back-btn{
            margin-top:10px;
            display:block;
            text-align:center;
            color:#94a3b8;
            text-decoration:none;
            font-size:13px;
        }

        .back-btn:hover{
            color:white;
        }

        @media(max-width:768px){
            .container{
                flex-direction:column;
            }
            .left-panel, .form-container{
                width:100%;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <div class="left-panel">
        <h2>AI Fraud Detection System</h2>
        <p>
            Enter transaction details to analyze suspicious financial activity.
            Our machine learning model evaluates patterns in real-time
            to detect fraudulent behavior instantly.
        </p>
    </div>

    <div class="form-container">
        <h2>🔍 Analyze Transaction</h2>

        <form action="/submit" method="POST">

            <input type="number" name="step" placeholder="Transaction Step" required>
            <input type="number" name="amount" placeholder="Transaction Amount" required>
            <input type="number" name="oldbalanceOrg" placeholder="Sender Old Balance" required>
            <input type="number" name="newbalanceOrig" placeholder="Sender New Balance" required>
            <input type="number" name="oldbalanceDest" placeholder="Receiver Old Balance" required>
            <input type="number" name="newbalanceDest" placeholder="Receiver New Balance" required>

            <select name="type" required>
                <option value="" disabled selected>Select Transaction Type</option>
                <option value="CASH_OUT">CASH OUT</option>
                <option value="DEBIT">DEBIT</option>
                <option value="PAYMENT">PAYMENT</option>
                <option value="TRANSFER">TRANSFER</option>
            </select>

            <input type="submit" value="Run Fraud Analysis" class="btn">

        </form>

        <a href="/" class="back-btn">⬅ Back to Home</a>

    </div>

</div>

</body>
</html>
