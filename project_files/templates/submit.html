<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#0f172a;
            color:white;
        }

        .result-container{
            width:500px;
            max-width:90%;
            padding:50px;
            border-radius:25px;
            text-align:center;
            background:#1e293b;
            box-shadow:0 20px 60px rgba(0,0,0,0.6);
            position:relative;
        }

        .status-icon{
            font-size:60px;
            margin-bottom:15px;
        }

        .status-text{
            font-size:28px;
            font-weight:700;
            margin-bottom:15px;
        }

        .fraud-theme{
            border:2px solid #ef4444;
            box-shadow:0 0 25px rgba(239,68,68,0.6);
        }

        .safe-theme{
            border:2px solid #22c55e;
            box-shadow:0 0 25px rgba(34,197,94,0.6);
        }

        .confidence-box{
            margin-top:20px;
            padding:15px;
            background:#334155;
            border-radius:12px;
            font-size:14px;
            opacity:0.9;
        }

        .btn{
            margin-top:25px;
            padding:14px 35px;
            border:none;
            border-radius:30px;
            font-weight:600;
            cursor:pointer;
            background:linear-gradient(90deg,#0ea5e9,#22c55e);
            color:white;
            transition:0.3s;
        }

        .btn:hover{
            transform:scale(1.07);
            box-shadow:0 0 20px rgba(34,197,94,0.6);
        }

        .header{
            font-size:18px;
            margin-bottom:20px;
            opacity:0.8;
        }

    </style>
</head>

<body>

<div class="result-container 
    {% if 'Fraud' in prediction_text %}fraud-theme{% else %}safe-theme{% endif %}">

    <div class="header">AI Transaction Risk Assessment</div>

    <div class="status-icon">
        {% if 'Fraud' in prediction_text %}
            🚨
        {% else %}
            ✅
        {% endif %}
    </div>

    <div class="status-text">
        {{ prediction_text }}
    </div>

    <div class="confidence-box">
        Model Confidence: {{ confidence if confidence else "High Accuracy Model" }}
    </div>

    <a href="/predict">
        <button class="btn">Analyze Another Transaction</button>
    </a>

</div>

</body>
</html>
